name: Update Altema catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 3"

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - name: Preserve previous catalog as a safe fallback
        run: cp data/catalog.json "$RUNNER_TEMP/catalog-before-scrape.json"
      - name: Scrape Altema catalog and icons
        run: npm run scrape-altema
      - name: Resolve English U.C. ENGAGE names
        env:
          GUNDAM_PREVIOUS_CATALOG_PATH: ${{ runner.temp }}/catalog-before-scrape.json
          GUNDAM_TRANSLATION_FALLBACK: "1"
          GAME8_MIN_INTERVAL_MS: "350"
          GAME8_MAX_RETRIES: "4"
          GAME8_ICON_CANDIDATES: "8"
          GUNDAM_WIKI_MIN_INTERVAL_MS: "1400"
          GUNDAM_WIKI_MAX_RETRIES: "6"
          GUNDAM_WIKI_429_FALLBACK_MS: "60000"
        run: npm run enrich-catalog-names
      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/gundam-wiki-name-cache.json icons/altema
          git diff --cached --quiet && echo "No changes" || git commit -m "Update Altema catalog"
          git push
